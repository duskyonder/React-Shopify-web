<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>{{project_title}}</title>

    <!-- =====================================================
         Google Site Verification (Google Search Console)
         Replace REPLACE_WITH_GSC_VERIFICATION_CODE with your actual code from:
         Google Search Console > Settings > Ownership verification > HTML tag
         Example: <meta name="google-site-verification" content="abc123xyz" />
    ====================================================== -->
    <!-- <meta name="google-site-verification" content="REPLACE_WITH_GSC_VERIFICATION_CODE" /> -->

    <!-- =====================================================
         Google Merchant Center (GMC) Verification
         Replace REPLACE_WITH_GMC_VERIFICATION_CODE with your actual code from:
         Google Merchant Center > Settings > Business info > Website > Verify
         Example: <meta name="google-site-verification" content="def456uvw" />
         Note: GMC uses the same meta tag format as GSC, but with a different code.
         You can have multiple google-site-verification meta tags on the same page.
    ====================================================== -->
    <!-- <meta name="google-site-verification" content="REPLACE_WITH_GMC_VERIFICATION_CODE" /> -->

    <!-- =====================================================
         Google Tag Manager (GTM) - Head Snippet
         Replace GTM-XXXXXXX with your actual GTM Container ID from:
         tagmanager.google.com > Your Container > Admin > Install Google Tag Manager
         GTM manages: GA4, Google Ads Conversion, Facebook Pixel, TikTok Pixel
    ====================================================== -->
    <!-- Google Tag Manager -->

    <!-- End Google Tag Manager -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  </head>
